name: Add Identity Records

on:
  workflow_dispatch:

jobs:
  add-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install datasets huggingface_hub
      - name: Login to HuggingFace
        run: hf auth login --token ${{ secrets.HF_TOKEN }}
      - name: Run identity script
        run: python scripts/add_identity.py
