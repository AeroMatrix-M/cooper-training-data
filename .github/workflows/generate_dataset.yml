name: Generate Cooper Training Data
on:
  workflow_dispatch:
    inputs:
      book_index:
        description: 'Book index to process (0-65)'
        required: true
        default: '0'
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pymupdf openai
      - name: Run processing script
        env:
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python scripts/download_and_process.py \
            --book-index ${{ github.event.inputs.book_index }}
      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_folder(
            folder_path='dataset/',
            repo_id='luckydestructor/cooper-training-dataset',
            repo_type='dataset'
          )
          "
          PYEOF
          python upload.py
